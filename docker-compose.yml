version: '3.8'
services:
  neo4j:
    image: neo4j:5.26.0
    container_name: lucy_neo4j_graph
    restart: unless-stopped
    ports:
      - "7474:7474"
      - "7687:7687"
    volumes:
      - ./neo4j/data:/data
      - ./neo4j/plugins:/plugins
      - ./neo4j/conf/apoc.conf:/var/lib/neo4j/conf/apoc.conf
    environment:
      - NEO4J_AUTH=neo4j/LucyDeterministicSecret2026
      - NEO4J_PLUGINS=["apoc"]
      - NEO4J_apoc_import_file_enabled=true
      - NEO4J_apoc_export_file_enabled=true
      - NEO4J_server_memory_heap_initial_size=2g
      - NEO4J_server_memory_heap_max_size=4g
    healthcheck:
      test: ["CMD-SHELL", "cypher-shell -u neo4j -p LucyDeterministicSecret2026 'RETURN 1'"]
      interval: 10s
      timeout: 5s
      retries: 5

  qdrant:
    image: qdrant/qdrant:latest
    container_name: lucy_qdrant_vector
    restart: unless-stopped
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - ./qdrant_storage:/qdrant/storage
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:6333/health"]
      interval: 10s
      timeout: 5s
      retries: 5
